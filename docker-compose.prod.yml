services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8010:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://45.79.124.28:8010/api/v1
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://45.79.124.28:8010/api/v1
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped
